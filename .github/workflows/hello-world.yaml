name: hello-world
on:
  workflow_dispatch:
  push:
    paths:
      - 'images/hello-world/**'
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  dev_build:
    uses: epichouse/github-templates/.github/workflows/docker_build.yaml@main
    with:
      image_tag: development
      image_name: hello-world
      build_path: images/hello-world
  dev_deploy:
    uses: epichouse/github-templates/.github/workflows/docker_pull.yaml@main
    needs: dev_build
    with:
      docker_server: ldnapptst1
      docker_compose_project: hello-world-test
  prod_build:
    uses: epichouse/github-templates/.github/workflows/docker_build.yaml@main
    needs: dev_deploy
    with:
      image_tag: latest
      image_name: hello-world
      build_path: images/hello-world
  prod_deploy:
    uses: epichouse/github-templates/.github/workflows/docker_pull.yaml@main
    needs: prod_build
    with:
      docker_server: ldnappprd1
      docker_compose_project: hello-world