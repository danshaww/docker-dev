name: dashy
on:
  workflow_dispatch:
  push:
    paths:
      - 'images/dashy/**'
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  dev_build:
    uses: epichouse/github-templates/.github/workflows/docker_build.yaml@main
    with:
      image_tag: development
      image_name: dashy
      build_path: images/dashy
  dev_deploy:
    uses: epichouse/github-templates/.github/workflows/docker_pull.yaml@main
    needs: dev_build
    with:
      docker_server: ldnapptst1
      docker_compose_project: dashy-test
  prod_build:
    uses: epichouse/github-templates/.github/workflows/docker_build.yaml@main
    needs: dev_deploy
    with:
      image_tag: latest
      image_name: dashy
      build_path: images/dashy
