name: Build Dashy

on:
  workflow_dispatch:
    inputs:
      build_dev:
        description: 'Build Development Image'
        required: true
        default: true
        type: boolean
      build_prod:
        description: 'Build Production Image'
        required: true
        default: false
        type: boolean

jobs:
  development:
    permissions:
      contents: read
      packages: write
    if: ${{ github.event.inputs.build_dev}}
    uses: epichouse/workflow-templates/.github/workflows/docker-build.yaml@main
    with:
      docker_env: development
      docker_project: "dashy"

  production:
    needs: development
    permissions:
      contents: read
      packages: write
    if: ${{ github.event.inputs.build_prod}}
    uses: epichouse/workflow-templates/.github/workflows/docker-build.yaml@main
    with:
      docker_env: latest
      docker_project: "dashy"
