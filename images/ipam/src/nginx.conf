server {
    listen 80;
    root /var/www/html;
    index ipam.php;

    location / {
        try_files $uri $uri/ /ipam.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php-fpm.sock;
        fastcgi_index ipam.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location /data/ {
        deny all;
    }
}