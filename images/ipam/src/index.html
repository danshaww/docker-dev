<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPAM — IP Address Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== TOKENS ===== */
:root {
  --radius: 6px;
  --radius-lg: 12px;
  --font-mono: 'JetBrains Mono', monospace;
  --font-display: 'Syne', sans-serif;
  --transition: 200ms ease;
}

[data-theme="dark"] {
  --bg:        #0d0f14;
  --bg2:       #13161e;
  --bg3:       #1c202c;
  --border:    #272b38;
  --border2:   #353a4d;
  --text:      #e8eaf2;
  --text2:     #8b90a8;
  --text3:     #555a72;
  --accent:    #4f8ef7;
  --accent2:   #3a6fd4;
  --green:     #3ecf8e;
  --red:       #f76f6f;
  --orange:    #f7a94f;
  --purple:    #a78bfa;
  --tag-bg:    #1a2035;
  --shadow:    0 4px 24px rgba(0,0,0,.45);
  --glow:      0 0 0 3px rgba(79,142,247,.18);
}

[data-theme="light"] {
  --bg:        #f0f2f8;
  --bg2:       #ffffff;
  --bg3:       #e8eaf2;
  --border:    #d4d8e8;
  --border2:   #bfc5d8;
  --text:      #1a1d2e;
  --text2:     #5a6080;
  --text3:     #9198b4;
  --accent:    #2563eb;
  --accent2:   #1d4ed8;
  --green:     #059669;
  --red:       #dc2626;
  --orange:    #d97706;
  --purple:    #7c3aed;
  --tag-bg:    #e0e4f4;
  --shadow:    0 4px 24px rgba(0,0,0,.08);
  --glow:      0 0 0 3px rgba(37,99,235,.15);
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: var(--font-display);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  transition: background var(--transition), color var(--transition);
}

/* ===== LAYOUT ===== */
.app { display: flex; flex-direction: column; min-height: 100vh; }

header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}

.logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 1.15rem; font-weight: 800; letter-spacing: -.5px;
}
.logo-icon {
  width: 30px; height: 30px;
  background: var(--accent);
  border-radius: 7px;
  display: grid; place-items: center;
  font-size: .65rem; font-weight: 700; color: #fff;
  font-family: var(--font-mono);
  letter-spacing: 0;
}
.logo span { color: var(--text2); font-weight: 400; }

.header-right { display: flex; align-items: center; gap: 10px; }

.main {
  display: grid;
  grid-template-columns: 300px 1fr;
  flex: 1;
  overflow: hidden;
}

/* ===== SIDEBAR ===== */
.sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-title {
  font-size: .72rem; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--text3);
}
.subnet-list {
  flex: 1; overflow-y: auto; padding: 8px;
}
.subnet-item {
  padding: 10px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  margin-bottom: 2px;
  transition: background var(--transition);
  border: 1px solid transparent;
}
.subnet-item:hover { background: var(--bg3); }
.subnet-item.active {
  background: var(--tag-bg);
  border-color: var(--accent);
}
.subnet-cidr {
  font-family: var(--font-mono);
  font-size: .82rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 2px;
}
.subnet-name { font-size: .78rem; color: var(--text2); }
.subnet-meta {
  display: flex; gap: 8px; margin-top: 5px;
}
.badge {
  font-family: var(--font-mono);
  font-size: .68rem; font-weight: 500;
  padding: 2px 7px;
  border-radius: 20px;
  background: var(--bg3);
  color: var(--text2);
  border: 1px solid var(--border);
}
.badge.green { background: rgba(62,207,142,.12); color: var(--green); border-color: rgba(62,207,142,.25); }
.badge.blue  { background: rgba(79,142,247,.12); color: var(--accent); border-color: rgba(79,142,247,.25); }

/* ===== CONTENT ===== */
.content {
  display: flex; flex-direction: column;
  overflow: hidden;
}

.content-header {
  padding: 18px 24px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 12px;
}
.content-title { font-size: 1.1rem; font-weight: 700; }
.content-subtitle { font-size: .78rem; color: var(--text2); font-family: var(--font-mono); margin-top: 3px; }

.toolbar {
  display: flex; align-items: center; gap: 8px;
}

.content-body {
  flex: 1; overflow-y: auto;
  padding: 20px 24px;
}

/* ===== EMPTY STATE ===== */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; min-height: 340px;
  color: var(--text3); gap: 12px;
  text-align: center;
}
.empty-icon { font-size: 2.5rem; opacity: .4; }
.empty-state h3 { font-size: 1rem; color: var(--text2); font-weight: 600; }
.empty-state p { font-size: .8rem; max-width: 260px; }

/* ===== STATS ROW ===== */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
}
.stat-label { font-size: .68rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); }
.stat-value { font-size: 1.6rem; font-weight: 800; font-family: var(--font-mono); margin-top: 4px; }
.stat-value.green  { color: var(--green); }
.stat-value.red    { color: var(--red); }
.stat-value.orange { color: var(--orange); }
.stat-value.blue   { color: var(--accent); }

/* ===== SEARCH ===== */
.search-bar {
  position: relative; margin-bottom: 16px;
}
.search-bar input {
  width: 100%;
  padding: 9px 14px 9px 36px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: .8rem;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.search-bar input:focus { outline: none; border-color: var(--accent); box-shadow: var(--glow); }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text3); pointer-events: none; font-size: .85rem;
}

/* ===== TABLE ===== */
.table-wrap {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead tr { background: var(--bg3); }
th {
  padding: 10px 14px;
  text-align: left;
  font-size: .68rem; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; color: var(--text3);
  border-bottom: 1px solid var(--border);
}
td {
  padding: 11px 14px;
  font-size: .82rem;
  border-bottom: 1px solid var(--border);
  color: var(--text2);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--bg3); }
.mono { font-family: var(--font-mono); color: var(--text); }

.status-dot {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: .78rem; font-weight: 600;
}
.status-dot::before {
  content: '';
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.active::before  { background: var(--green); box-shadow: 0 0 5px var(--green); }
.status-dot.reserved::before { background: var(--orange); }
.status-dot.inactive::before { background: var(--text3); }
.status-dot.dhcp::before     { background: var(--purple); }

.status-dot.active   { color: var(--green); }
.status-dot.reserved { color: var(--orange); }
.status-dot.inactive { color: var(--text3); }
.status-dot.dhcp     { color: var(--purple); }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: var(--radius);
  font-family: var(--font-display); font-size: .78rem; font-weight: 600;
  cursor: pointer; border: 1px solid transparent;
  transition: all var(--transition); white-space: nowrap;
}
.btn-primary {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
.btn-ghost {
  background: transparent; color: var(--text2); border-color: var(--border);
}
.btn-ghost:hover { background: var(--bg3); color: var(--text); }
.btn-danger {
  background: transparent; color: var(--red); border-color: transparent;
}
.btn-danger:hover { background: rgba(247,111,111,.1); border-color: var(--red); }
.btn-icon {
  padding: 6px 8px;
}
.btn-sm { padding: 4px 10px; font-size: .72rem; }

/* ===== THEME TOGGLE ===== */
.theme-toggle {
  width: 34px; height: 34px;
  border-radius: var(--radius);
  background: var(--bg3);
  border: 1px solid var(--border);
  cursor: pointer;
  display: grid; place-items: center;
  font-size: 1rem;
  transition: all var(--transition);
  color: var(--text2);
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity var(--transition);
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 480px; max-width: 95vw;
  box-shadow: var(--shadow);
  transform: translateY(10px);
  transition: transform var(--transition);
  max-height: 90vh;
  overflow-y: auto;
}
.modal-overlay.open .modal { transform: none; }
.modal-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: .95rem; font-weight: 700; }
.modal-close {
  width: 28px; height: 28px; border-radius: var(--radius);
  border: 1px solid var(--border); background: transparent;
  cursor: pointer; display: grid; place-items: center;
  color: var(--text2); font-size: 1rem;
  transition: all var(--transition);
}
.modal-close:hover { background: var(--bg3); color: var(--text); }
.modal-body { padding: 18px 20px; }
.modal-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 8px;
}

/* ===== FORM ===== */
.form-row { margin-bottom: 14px; }
.form-row-2 {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px;
}
label {
  display: block; font-size: .72rem; font-weight: 700;
  color: var(--text3); margin-bottom: 5px;
  letter-spacing: .05em; text-transform: uppercase;
}
input, select, textarea {
  width: 100%;
  padding: 8px 11px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: .82rem;
  transition: border-color var(--transition), box-shadow var(--transition);
}
input:focus, select:focus, textarea:focus {
  outline: none; border-color: var(--accent); box-shadow: var(--glow);
}
select option { background: var(--bg2); }
textarea { resize: vertical; min-height: 64px; }
.input-hint { font-size: .7rem; color: var(--text3); margin-top: 4px; }

/* ===== TOAST ===== */
#toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 16px;
  font-size: .8rem; font-weight: 600;
  box-shadow: var(--shadow);
  z-index: 999;
  display: flex; align-items: center; gap: 8px;
  transform: translateY(60px); opacity: 0;
  transition: all 300ms ease;
  max-width: 320px;
}
#toast.show { transform: none; opacity: 1; }
#toast.success { border-left: 3px solid var(--green); }
#toast.error   { border-left: 3px solid var(--red); }

/* ===== SUBNET DETAIL HEADER ===== */
.subnet-info-strip {
  display: flex; gap: 24px; margin-bottom: 20px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  flex-wrap: wrap;
}
.subnet-info-item {}
.subnet-info-label { font-size: .65rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); }
.subnet-info-value { font-family: var(--font-mono); font-size: .85rem; font-weight: 600; color: var(--text); margin-top: 2px; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ===== PROGRESS BAR ===== */
.usage-bar {
  width: 80px; height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
  display: inline-block;
  vertical-align: middle;
  margin-right: 6px;
}
.usage-bar-fill {
  height: 100%; border-radius: 3px;
  transition: width .3s ease;
}

/* ===== LOADING ===== */
.loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text3); gap: 10px; }
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== SUBNET OVERVIEW GRID ===== */
.subnet-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}
.subnet-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative; overflow: hidden;
}
.subnet-card:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.subnet-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--purple));
}
.subnet-card-cidr {
  font-family: var(--font-mono); font-size: 1rem; font-weight: 700;
  color: var(--text); margin-bottom: 4px;
}
.subnet-card-name { font-size: .8rem; color: var(--text2); margin-bottom: 12px; }
.subnet-card-bar {
  height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-bottom: 6px;
}
.subnet-card-bar-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--green), var(--accent));
  transition: width .4s ease;
}
.subnet-card-stats {
  display: flex; gap: 12px; font-size: .72rem; color: var(--text3);
  font-family: var(--font-mono);
}
.subnet-card-stats span b { color: var(--text); }
.subnet-card-actions {
  position: absolute; top: 12px; right: 12px;
  display: flex; gap: 4px; opacity: 0; transition: opacity var(--transition);
}
.subnet-card:hover .subnet-card-actions { opacity: 1; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .main { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="app">

<!-- ===== HEADER ===== -->
<header>
  <div class="logo">
    <div class="logo-icon">IP</div>
    IPAM <span>Address Manager</span>
  </div>
  <div class="header-right">
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
    <button class="btn btn-primary" onclick="openAddSubnetModal()">+ Add Subnet</button>
  </div>
</header>

<!-- ===== MAIN ===== -->
<div class="main">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Subnets</span>
      <button class="btn btn-ghost btn-sm btn-icon" onclick="openAddSubnetModal()" title="Add subnet">+</button>
    </div>
    <div class="subnet-list" id="subnetList">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </aside>

  <!-- CONTENT -->
  <main class="content">
    <div id="mainContent">
      <!-- Overview or subnet detail rendered here -->
    </div>
  </main>

</div><!-- .main -->
</div><!-- .app -->

<!-- ===== TOAST ===== -->
<div id="toast"></div>

<!-- ===== MODAL: ADD / EDIT SUBNET ===== -->
<div class="modal-overlay" id="subnetModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="subnetModalTitle">Add Subnet</span>
      <button class="modal-close" onclick="closeModal('subnetModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="subnetEditId">
      <div class="form-row">
        <label>Subnet Name</label>
        <input type="text" id="subnetName" placeholder="e.g. Office LAN">
      </div>
      <div class="form-row-2">
        <div>
          <label>Network Address</label>
          <input type="text" id="subnetNetwork" placeholder="192.168.1.0">
        </div>
        <div>
          <label>Prefix Length</label>
          <input type="number" id="subnetPrefix" placeholder="24" min="1" max="32">
        </div>
      </div>
      <div class="form-row-2">
        <div>
          <label>Gateway</label>
          <input type="text" id="subnetGateway" placeholder="192.168.1.1">
        </div>
        <div>
          <label>VLAN ID</label>
          <input type="text" id="subnetVlan" placeholder="100">
        </div>
      </div>
      <div class="form-row">
        <label>Description</label>
        <textarea id="subnetDesc" placeholder="Optional description…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('subnetModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSubnet()">Save Subnet</button>
    </div>
  </div>
</div>

<!-- ===== MODAL: ADD / EDIT IP ===== -->
<div class="modal-overlay" id="ipModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="ipModalTitle">Add IP Address</span>
      <button class="modal-close" onclick="closeModal('ipModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="ipEditId">
      <input type="hidden" id="ipSubnetId">
      <div class="form-row">
        <label>IP Address</label>
        <input type="text" id="ipAddress" placeholder="192.168.1.10" id="ipAddress">
        <div class="input-hint" id="ipHint"></div>
      </div>
      <div class="form-row-2">
        <div>
          <label>Hostname</label>
          <input type="text" id="ipHostname" placeholder="server-01.local">
        </div>
        <div>
          <label>Owner / User</label>
          <input type="text" id="ipOwner" placeholder="Alice">
        </div>
      </div>
      <div class="form-row-2">
        <div>
          <label>MAC Address</label>
          <input type="text" id="ipMac" placeholder="AA:BB:CC:DD:EE:FF">
        </div>
        <div>
          <label>Status</label>
          <select id="ipStatus">
            <option value="active">Active</option>
            <option value="reserved">Reserved</option>
            <option value="dhcp">DHCP</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label>Description</label>
        <textarea id="ipDesc" placeholder="Optional description…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('ipModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveIp()">Save IP</button>
    </div>
  </div>
</div>

<!-- ===== MODAL: CONFIRM DELETE ===== -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal" style="width:380px">
    <div class="modal-header">
      <span class="modal-title">Confirm Delete</span>
      <button class="modal-close" onclick="closeModal('confirmModal')">✕</button>
    </div>
    <div class="modal-body">
      <p id="confirmMsg" style="color:var(--text2);font-size:.85rem;line-height:1.6"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('confirmModal')">Cancel</button>
      <button class="btn btn-danger" id="confirmBtn">Delete</button>
    </div>
  </div>
</div>

<script>
/* ===========================
   CONFIG
=========================== */
const API = 'api.php';

/* ===========================
   STATE
=========================== */
let subnets     = [];
let currentSubnet = null;
let currentIps  = [];

/* ===========================
   THEME
=========================== */
const html  = document.documentElement;
const themeBtn = document.getElementById('themeToggle');

function setTheme(t) {
  html.dataset.theme = t;
  themeBtn.textContent = t === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('ipam-theme', t);
}

themeBtn.addEventListener('click', () => {
  setTheme(html.dataset.theme === 'dark' ? 'light' : 'dark');
});

setTheme(localStorage.getItem('ipam-theme') || 'dark');

/* ===========================
   API HELPERS
=========================== */
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(`${API}?path=${encodeURIComponent(path)}`, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
  return data;
}

/* ===========================
   TOAST
=========================== */
let toastTimer;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3200);
}

/* ===========================
   MODALS
=========================== */
function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); });
});

function confirmAction(msg, fn) {
  document.getElementById('confirmMsg').textContent = msg;
  const btn = document.getElementById('confirmBtn');
  btn.onclick = () => { closeModal('confirmModal'); fn(); };
  openModal('confirmModal');
}

/* ===========================
   UTILS
=========================== */
function cidrToRange(network, prefix) {
  const total = Math.pow(2, 32 - parseInt(prefix));
  const usable = total <= 2 ? total : total - 2;
  return { total, usable };
}

function usageColor(pct) {
  if (pct >= 90) return 'var(--red)';
  if (pct >= 70) return 'var(--orange)';
  return 'var(--green)';
}

function formatDate(str) {
  if (!str) return '—';
  return str.split(' ')[0];
}

/* ===========================
   SUBNETS
=========================== */
async function loadSubnets() {
  subnets = await api('GET', 'subnets');
  renderSidebar();
  if (currentSubnet) {
    const updated = subnets.find(s => s.id === currentSubnet.id);
    if (updated) { currentSubnet = updated; }
    renderSubnetDetail();
  } else {
    renderOverview();
  }
}

function renderSidebar() {
  const el = document.getElementById('subnetList');
  if (!subnets.length) {
    el.innerHTML = `<div style="padding:16px;text-align:center;color:var(--text3);font-size:.75rem">No subnets yet.<br>Click + to add one.</div>`;
    return;
  }
  el.innerHTML = subnets.map(s => {
    const ipCount = 0; // loaded lazily per subnet
    const active  = currentSubnet && currentSubnet.id === s.id ? ' active' : '';
    return `<div class="subnet-item${active}" onclick="selectSubnet('${s.id}')">
      <div class="subnet-cidr">${s.network}/${s.prefix}</div>
      <div class="subnet-name">${escHtml(s.name)}</div>
      <div class="subnet-meta">
        ${s.vlan ? `<span class="badge blue">VLAN ${escHtml(s.vlan)}</span>` : ''}
        ${s.gateway ? `<span class="badge">GW ${escHtml(s.gateway)}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderOverview() {
  const mc = document.getElementById('mainContent');
  if (!subnets.length) {
    mc.innerHTML = `<div class="content-header"><div><div class="content-title">Overview</div><div class="content-subtitle">All subnets</div></div></div>
    <div class="content-body"><div class="empty-state">
      <div class="empty-icon">🌐</div>
      <h3>No subnets defined</h3>
      <p>Add a subnet to start tracking IP allocations.</p>
      <button class="btn btn-primary" style="margin-top:8px" onclick="openAddSubnetModal()">+ Add First Subnet</button>
    </div></div>`;
    return;
  }

  mc.innerHTML = `<div class="content-header">
    <div><div class="content-title">Overview</div>
    <div class="content-subtitle">${subnets.length} subnet${subnets.length!==1?'s':''} defined</div></div>
    <div class="toolbar">
      <button class="btn btn-primary" onclick="openAddSubnetModal()">+ Add Subnet</button>
    </div>
  </div>
  <div class="content-body">
    <div class="subnet-grid" id="overviewGrid">
      <div class="loading"><div class="spinner"></div> Loading…</div>
    </div>
  </div>`;

  // Load all subnet IPs for overview
  Promise.all(subnets.map(s => api('GET', `subnets/${s.id}/ips`).then(ips => ({ s, ips }))))
    .then(results => {
      const grid = document.getElementById('overviewGrid');
      if (!grid) return;
      grid.innerHTML = results.map(({ s, ips }) => {
        const { usable } = cidrToRange(s.network, s.prefix);
        const pct   = usable > 0 ? Math.round((ips.length / usable) * 100) : 0;
        const color = usageColor(pct);
        return `<div class="subnet-card" onclick="selectSubnet('${s.id}')">
          <div class="subnet-card-actions">
            <button class="btn btn-ghost btn-icon btn-sm" title="Edit" onclick="event.stopPropagation();openEditSubnetModal('${s.id}')">✏️</button>
            <button class="btn btn-danger btn-icon btn-sm" title="Delete" onclick="event.stopPropagation();deleteSubnetConfirm('${s.id}')">🗑</button>
          </div>
          <div class="subnet-card-cidr">${s.network}/${s.prefix}</div>
          <div class="subnet-card-name">${escHtml(s.name)}</div>
          <div class="subnet-card-bar"><div class="subnet-card-bar-fill" style="width:${pct}%;background:${color}"></div></div>
          <div class="subnet-card-stats">
            <span><b>${ips.length}</b> used</span>
            <span><b>${Math.max(0,usable-ips.length)}</b> free</span>
            <span><b>${usable}</b> total</span>
            <span><b>${pct}%</b></span>
          </div>
        </div>`;
      }).join('');
    });
}

async function selectSubnet(id) {
  currentSubnet = subnets.find(s => s.id === id);
  renderSidebar();
  await loadIps();
}

function openAddSubnetModal() {
  document.getElementById('subnetEditId').value = '';
  document.getElementById('subnetModalTitle').textContent = 'Add Subnet';
  ['subnetName','subnetNetwork','subnetPrefix','subnetGateway','subnetVlan','subnetDesc'].forEach(id => {
    document.getElementById(id).value = '';
  });
  openModal('subnetModal');
}

function openEditSubnetModal(id) {
  const s = subnets.find(s => s.id === id);
  if (!s) return;
  document.getElementById('subnetEditId').value = s.id;
  document.getElementById('subnetModalTitle').textContent = 'Edit Subnet';
  document.getElementById('subnetName').value    = s.name;
  document.getElementById('subnetNetwork').value = s.network;
  document.getElementById('subnetPrefix').value  = s.prefix;
  document.getElementById('subnetGateway').value = s.gateway;
  document.getElementById('subnetVlan').value    = s.vlan;
  document.getElementById('subnetDesc').value    = s.description;
  openModal('subnetModal');
}

async function saveSubnet() {
  const id      = document.getElementById('subnetEditId').value;
  const network = document.getElementById('subnetNetwork').value.trim();
  const prefix  = document.getElementById('subnetPrefix').value.trim();
  if (!network || !prefix) { toast('Network and prefix are required', 'error'); return; }

  const body = {
    name:        document.getElementById('subnetName').value.trim() || `${network}/${prefix}`,
    network, prefix,
    gateway:     document.getElementById('subnetGateway').value.trim(),
    vlan:        document.getElementById('subnetVlan').value.trim(),
    description: document.getElementById('subnetDesc').value.trim(),
  };

  try {
    if (id) { await api('PUT', `subnets/${id}`, body); toast('Subnet updated'); }
    else     { await api('POST', 'subnets', body);    toast('Subnet added'); }
    closeModal('subnetModal');
    await loadSubnets();
  } catch(e) { toast(e.message, 'error'); }
}

function deleteSubnetConfirm(id) {
  const s = subnets.find(s => s.id === id);
  confirmAction(`Delete subnet "${s?.name || id}" and all its IP records? This cannot be undone.`, async () => {
    try {
      await api('DELETE', `subnets/${id}`);
      if (currentSubnet?.id === id) { currentSubnet = null; }
      toast('Subnet deleted');
      await loadSubnets();
    } catch(e) { toast(e.message, 'error'); }
  });
}

/* ===========================
   IPs
=========================== */
async function loadIps() {
  if (!currentSubnet) return;
  currentIps = await api('GET', `subnets/${currentSubnet.id}/ips`);
  renderSubnetDetail();
}

function renderSubnetDetail() {
  if (!currentSubnet) return;
  const s = currentSubnet;
  const ips = currentIps;
  const { usable, total } = cidrToRange(s.network, s.prefix);
  const used = ips.length;
  const free = Math.max(0, usable - used);
  const pct  = usable > 0 ? Math.round((used / usable) * 100) : 0;

  const statusCounts = { active:0, reserved:0, dhcp:0, inactive:0 };
  ips.forEach(ip => { if (statusCounts[ip.status] !== undefined) statusCounts[ip.status]++; });

  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
  <div class="content-header">
    <div>
      <div class="content-title">${escHtml(s.name)}</div>
      <div class="content-subtitle">${s.network}/${s.prefix}${s.gateway?' · GW '+s.gateway:''}${s.vlan?' · VLAN '+s.vlan:''}</div>
    </div>
    <div class="toolbar">
      <button class="btn btn-ghost" onclick="openEditSubnetModal('${s.id}')">✏️ Edit</button>
      <button class="btn btn-danger" onclick="deleteSubnetConfirm('${s.id}')">🗑 Delete</button>
      <button class="btn btn-primary" onclick="openAddIpModal('${s.id}')">+ Add IP</button>
    </div>
  </div>
  <div class="content-body">

    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Allocated</div><div class="stat-value blue">${used}</div></div>
      <div class="stat-card"><div class="stat-label">Available</div><div class="stat-value green">${free}</div></div>
      <div class="stat-card"><div class="stat-label">Total Usable</div><div class="stat-value">${usable}</div></div>
      <div class="stat-card"><div class="stat-label">Utilisation</div><div class="stat-value" style="color:${usageColor(pct)}">${pct}%</div></div>
    </div>

    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="ipSearch" placeholder="Search by IP, hostname, MAC, owner…" oninput="filterIps()">
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>IP Address</th>
            <th>Hostname</th>
            <th>MAC Address</th>
            <th>Owner</th>
            <th>Status</th>
            <th>Description</th>
            <th>Updated</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="ipTableBody"></tbody>
      </table>
    </div>
  </div>`;

  renderIpRows(ips);
}

function renderIpRows(ips) {
  const tbody = document.getElementById('ipTableBody');
  if (!tbody) return;
  if (!ips.length) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:32px">
      No IP addresses allocated yet. Click <b>+ Add IP</b> to start.
    </td></tr>`;
    return;
  }
  tbody.innerHTML = ips.map(ip => `
    <tr>
      <td class="mono">${ip.ip}</td>
      <td class="mono" style="color:var(--text)">${ip.hostname || '—'}</td>
      <td class="mono" style="font-size:.75rem">${ip.mac || '—'}</td>
      <td>${ip.owner || '—'}</td>
      <td><span class="status-dot ${ip.status}">${ip.status}</span></td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(ip.description)}">${escHtml(ip.description)||'—'}</td>
      <td style="font-size:.75rem">${formatDate(ip.updated)}</td>
      <td>
        <div style="display:flex;gap:4px">
          <button class="btn btn-ghost btn-icon btn-sm" title="Edit" onclick="openEditIpModal('${ip.id}')">✏️</button>
          <button class="btn btn-danger btn-icon btn-sm" title="Delete" onclick="deleteIpConfirm('${ip.id}')">🗑</button>
        </div>
      </td>
    </tr>`).join('');
}

function filterIps() {
  const q = document.getElementById('ipSearch').value.toLowerCase();
  if (!q) { renderIpRows(currentIps); return; }
  const filtered = currentIps.filter(ip =>
    ip.ip.includes(q) ||
    (ip.hostname||'').toLowerCase().includes(q) ||
    (ip.mac||'').toLowerCase().includes(q) ||
    (ip.owner||'').toLowerCase().includes(q) ||
    (ip.description||'').toLowerCase().includes(q)
  );
  renderIpRows(filtered);
}

function openAddIpModal(subnetId) {
  document.getElementById('ipEditId').value   = '';
  document.getElementById('ipSubnetId').value = subnetId || currentSubnet?.id;
  document.getElementById('ipModalTitle').textContent = 'Add IP Address';
  ['ipAddress','ipHostname','ipOwner','ipMac','ipDesc'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('ipStatus').value = 'active';
  const s = currentSubnet;
  document.getElementById('ipHint').textContent = s ? `Must be within ${s.network}/${s.prefix}` : '';
  const ipInput = document.getElementById('ipAddress');
  ipInput.readOnly = false;
  openModal('ipModal');
}

function openEditIpModal(ipId) {
  const ip = currentIps.find(i => i.id === ipId);
  if (!ip) return;
  document.getElementById('ipEditId').value    = ip.id;
  document.getElementById('ipSubnetId').value  = currentSubnet.id;
  document.getElementById('ipModalTitle').textContent = 'Edit IP Address';
  document.getElementById('ipAddress').value   = ip.ip;
  document.getElementById('ipAddress').readOnly = true;
  document.getElementById('ipHostname').value  = ip.hostname;
  document.getElementById('ipOwner').value     = ip.owner;
  document.getElementById('ipMac').value       = ip.mac;
  document.getElementById('ipStatus').value    = ip.status;
  document.getElementById('ipDesc').value      = ip.description;
  document.getElementById('ipHint').textContent = '';
  openModal('ipModal');
}

async function saveIp() {
  const editId    = document.getElementById('ipEditId').value;
  const subnetId  = document.getElementById('ipSubnetId').value;
  const ipAddress = document.getElementById('ipAddress').value.trim();
  if (!ipAddress) { toast('IP address is required', 'error'); return; }

  const body = {
    ip:          ipAddress,
    hostname:    document.getElementById('ipHostname').value.trim(),
    owner:       document.getElementById('ipOwner').value.trim(),
    mac:         document.getElementById('ipMac').value.trim(),
    status:      document.getElementById('ipStatus').value,
    description: document.getElementById('ipDesc').value.trim(),
  };

  try {
    if (editId) {
      await api('PUT', `subnets/${subnetId}/ips/${editId}`, body);
      toast('IP record updated');
    } else {
      await api('POST', `subnets/${subnetId}/ips`, body);
      toast('IP address allocated');
    }
    closeModal('ipModal');
    await loadIps();
  } catch(e) { toast(e.message, 'error'); }
}

function deleteIpConfirm(ipId) {
  const ip = currentIps.find(i => i.id === ipId);
  confirmAction(`Release IP address ${ip?.ip || ipId}?`, async () => {
    try {
      await api('DELETE', `subnets/${currentSubnet.id}/ips/${ipId}`);
      toast('IP address released');
      await loadIps();
    } catch(e) { toast(e.message, 'error'); }
  });
}

/* ===========================
   HELPERS
=========================== */
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ===========================
   INIT
=========================== */
loadSubnets();
</script>
</body>
</html>
