<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <style>
    html {
      color-scheme: dark light;
      background: #0a0c10;
    }

    @media (prefers-color-scheme: light) {
      html { background: #f4f5f7; }
    }

    :root {
      --bg: #0a0c10;
      --surface: #111318;
      --border: #1e2230;
      --text: #e2e8f0;
      --muted: #6b7280;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f5f7;
        --surface: #ffffff;
        --border: #d1d5db;
        --text: #111827;
        --muted: #6b7280;
      }

      header p { color: #374151 !important; }
      .section-header h2 { color: #9ca3af; }
      .section-header::after { background: #e5e7eb; }
      .links a { color: #4b5563 !important; }

      .theme-cloud .dot { background: #0284c7; box-shadow: 0 0 6px #0284c788; }
      .theme-infra  .dot { background: #ea580c; box-shadow: 0 0 6px #ea580c88; }
      .theme-prod   .dot { background: #16a34a; box-shadow: 0 0 6px #16a34a88; }
      .theme-test   .dot { background: #9333ea; box-shadow: 0 0 6px #9333ea88; }

      .theme-cloud .links a:hover { color: #0284c7 !important; }
      .theme-infra  .links a:hover { color: #ea580c !important; }
      .theme-prod   .links a:hover { color: #16a34a !important; }
      .theme-test   .links a:hover { color: #9333ea !important; }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      padding: 48px 32px;
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 48px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    header p {
      font-family: 'Roboto', sans-serif;
      font-size: 0.9rem;
      color: #a0aec0;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .sections-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 1100px) {
      .sections-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      .sections-grid { grid-template-columns: 1fr; }
    }

    .section { margin-bottom: 0; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-header h2 {
      font-family: 'Roboto', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
    }

    .section-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .theme-cloud .dot { background: #00e5ff; box-shadow: 0 0 6px #00e5ff88; }
    .theme-infra  .dot { background: #f97316; box-shadow: 0 0 6px #f9731688; }
    .theme-prod   .dot { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .theme-test   .dot { background: #a855f7; box-shadow: 0 0 6px #a855f788; }

    .links {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .links a {
      display: inline-block;
      color: #cbd5e1 !important;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 400;
      transition: color 0.15s;
    }

    .theme-cloud .links a:hover { color: #00e5ff !important; }
    .theme-infra  .links a:hover { color: #f97316 !important; }
    .theme-prod   .links a:hover { color: #22c55e !important; }
    .theme-test   .links a:hover { color: #a855f7 !important; }

    #error {
      color: #f87171;
      font-size: 0.9rem;
      margin-top: 24px;
    }
  </style>
</head>
<body>

  <header>
    <p>Internal Services Dashboard</p>
  </header>

  <div class="sections-grid" id="grid"></div>
  <p id="error" style="display:none"></p>

  <script>
    fetch('bookmarks.yaml')
      .then(r => {
        if (!r.ok) throw new Error(`Could not load bookmarks.yaml (${r.status})`);
        return r.text();
      })
      .then(text => {
        const data = jsyaml.load(text);
        const grid = document.getElementById('grid');

        data.sections.forEach(section => {
          const theme = section.theme || 'cloud';
          const el = document.createElement('section');
          el.className = `section theme-${theme}`;
          el.innerHTML = `
            <div class="section-header">
              <span class="dot"></span>
              <h2>${section.title}</h2>
            </div>
            <div class="links">
              ${section.links.map(link =>
                `<a href="${link.url}" target="_blank">${link.name}</a>`
              ).join('\n')}
            </div>
          `;
          grid.appendChild(el);
        });
      })
      .catch(err => {
        const errEl = document.getElementById('error');
        errEl.style.display = 'block';
        errEl.textContent = `Error: ${err.message}`;
      });
  </script>

</body>
</html>
