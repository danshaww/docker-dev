<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <style>
    html {
      color-scheme: dark light;
      background: #0a0c10;
    }

    @media (prefers-color-scheme: light) {
      html { background: #f4f5f7; }
    }

    :root {
      --bg: #0a0c10;
      --surface: #111318;
      --border: #1e2230;
      --text: #e2e8f0;
      --muted: #6b7280;
      --tag-bg: #1e2230;
      --tag-text: #94a3b8;
      --tag-border: #2d3748;
      --filter-bg: #161a24;
      --filter-active-bg: #2d3748;
      --filter-text: #94a3b8;
      --filter-active-text: #e2e8f0;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f5f7;
        --surface: #ffffff;
        --border: #d1d5db;
        --text: #111827;
        --muted: #6b7280;
        --tag-bg: #e5e7eb;
        --tag-text: #4b5563;
        --tag-border: #d1d5db;
        --filter-bg: #e5e7eb;
        --filter-active-bg: #d1d5db;
        --filter-text: #6b7280;
        --filter-active-text: #111827;
      }

      header p { color: #374151 !important; }
      .section-header h2 { color: #9ca3af; }
      .section-header::after { background: #e5e7eb; }
      .links a { }

      .theme-cyan   .dot { background: #0284c7; box-shadow: 0 0 6px #0284c788; }
      .theme-orange .dot { background: #ea580c; box-shadow: 0 0 6px #ea580c88; }
      .theme-green  .dot { background: #16a34a; box-shadow: 0 0 6px #16a34a88; }
      .theme-purple .dot { background: #9333ea; box-shadow: 0 0 6px #9333ea88; }
      .theme-red    .dot { background: #dc2626; box-shadow: 0 0 6px #dc262688; }
      .theme-pink   .dot { background: #db2777; box-shadow: 0 0 6px #db277788; }
      .theme-yellow .dot { background: #ca8a04; box-shadow: 0 0 6px #ca8a0488; }
      .theme-teal   .dot { background: #0d9488; box-shadow: 0 0 6px #0d948888; }

      .theme-cyan   .links a:hover { color: #0284c7 !important; }
      .theme-orange .links a:hover { color: #ea580c !important; }
      .theme-green  .links a:hover { color: #16a34a !important; }
      .theme-purple .links a:hover { color: #9333ea !important; }
      .theme-red    .links a:hover { color: #dc2626 !important; }
      .theme-pink   .links a:hover { color: #db2777 !important; }
      .theme-yellow .links a:hover { color: #ca8a04 !important; }
      .theme-teal   .links a:hover { color: #0d9488 !important; }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      padding: 48px 32px;
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    header img {
      height: 32px;
      width: auto;
      flex-shrink: 0;
    }

    header p {
      font-family: 'Roboto', sans-serif;
      font-size: 0.9rem;
      color: #a0aec0;
      letter-spacing: 1px;
      text-transform: uppercase;
    }


    .sections-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 1100px) {
      .sections-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      .sections-grid { grid-template-columns: 1fr; }
    }

    .section { margin-bottom: 0; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-header h2 {
      font-family: 'Roboto', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
    }

    .section-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .theme-cyan   .dot { background: #00e5ff; box-shadow: 0 0 6px #00e5ff88; }
    .theme-orange .dot { background: #f97316; box-shadow: 0 0 6px #f9731688; }
    .theme-green  .dot { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .theme-purple .dot { background: #a855f7; box-shadow: 0 0 6px #a855f788; }
    .theme-red    .dot { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
    .theme-pink   .dot { background: #ec4899; box-shadow: 0 0 6px #ec489988; }
    .theme-yellow .dot { background: #eab308; box-shadow: 0 0 6px #eab30888; }
    .theme-teal   .dot { background: #14b8a6; box-shadow: 0 0 6px #14b8a688; }

    .links {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .link-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }


    .links a {
      display: inline-block;
      color: #cbd5e1;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 400;
      transition: color 0.15s;
    }

    @media (prefers-color-scheme: light) {
      .links a { color: #111827; }
    }

    .theme-cyan   .links a:hover { color: #00e5ff !important; }
    .theme-orange .links a:hover { color: #f97316 !important; }
    .theme-green  .links a:hover { color: #22c55e !important; }
    .theme-purple .links a:hover { color: #a855f7 !important; }
    .theme-red    .links a:hover { color: #ef4444 !important; }
    .theme-pink   .links a:hover { color: #ec4899 !important; }
    .theme-yellow .links a:hover { color: #eab308 !important; }
    .theme-teal   .links a:hover { color: #14b8a6 !important; }

    .tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      color: var(--tag-text);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .link-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: 0.75;
      transition: opacity 0.15s;
      object-fit: contain;
    }

    .link-row:hover .link-icon {
      opacity: 1;
    }

    .link-icon.hidden {
      display: none;
    }

    .icon-placeholder {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }


      color: #f87171;
      font-size: 0.9rem;
      margin-top: 24px;
    }
  </style>
</head>
<body>

  <header>
    <img src="logo.png" alt="Logo">
    <p>Homelab Dashboard</p>
  </header>

  <div class="sections-grid" id="grid"></div>
  <p id="error" style="display:none"></p>

  <script>
    fetch('bookmarks.yaml')
      .then(r => {
        if (!r.ok) throw new Error(`Could not load bookmarks.yaml (${r.status})`);
        return r.text();
      })
      .then(text => {
        const data = jsyaml.load(text);
        const grid = document.getElementById('grid');

        // Render sections
        data.sections.forEach(section => {
          const theme = section.theme || 'cyan';
          const el = document.createElement('section');
          el.className = `section theme-${theme}`;

          const linksHtml = section.links.map(link => {
            const tags = link.tags
              ? (Array.isArray(link.tags) ? link.tags : [link.tags])
              : [];
            const tagDataAttr = tags.map(t => t.toLowerCase()).join(',');
            const tagsHtml = tags.map(t => `<span class="tag">${t}</span>`).join('');

            const iconName = link.icon || null;
            const iconUrl = iconName
              ? (iconName.startsWith('http') ? iconName : `https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/${iconName}.svg`)
              : null;
            const iconHtml = iconUrl
              ? `<img class="link-icon" src="${iconUrl}" alt="" onerror="this.classList.add('hidden')">`
              : `<span class="icon-placeholder"></span>`;

            return `<div class="link-row" data-tags="${tagDataAttr}">
              ${iconHtml}<a href="${link.url}">${link.name}</a>${tagsHtml}
            </div>`;
          }).join('\n');

          el.innerHTML = `
            <div class="section-header">
              <span class="dot"></span>
              <h2>${section.title}</h2>
            </div>
            <div class="links">${linksHtml}</div>
          `;
          grid.appendChild(el);
        });
      })
      .catch(err => {
        const errEl = document.getElementById('error');
        errEl.style.display = 'block';
        errEl.textContent = `Error: ${err.message}`;
      });
  </script>

</body>
</html>
